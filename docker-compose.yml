version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-giancore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-giancore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-giancore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── GianCore App ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER:-giancore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-giancore}
      NEXTAUTH_SECRET:       ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL:          ${NEXTAUTH_URL:-http://localhost:3000}
      DISCORD_CLIENT_ID:     ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      API_TOKEN:             ${API_TOKEN:?API_TOKEN is required}
      NODE_ENV:              production
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Discord Bot ───────────────────────────────────────────────────────────────
  discord-bot:
    build:
      context: ./bots/discord
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DISCORD_BOT_TOKEN:    ${DISCORD_BOT_TOKEN:?DISCORD_BOT_TOKEN is required}
      DISCORD_CLIENT_ID:    ${DISCORD_BOT_CLIENT_ID:-}
      GIANCORE_API_URL:     http://app:3000
      API_TOKEN:            ${API_TOKEN:?API_TOKEN is required}
      NODE_ENV:             production

volumes:
  postgres_data:
